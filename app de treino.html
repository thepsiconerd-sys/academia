<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14110E;
    --bg-elev:#1E1A16;
    --bg-elev-2:#26211B;
    --line:#332C24;
    --gold:#E8B64A;
    --amber:#C9622A;
    --cream:#F5EFE6;
    --muted:#9C9388;
    --done:#8FAE3A;
    --done-bg:rgba(143,174,58,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    min-height:100vh;
  }
  .wrap{
    max-width:480px;
    margin:0 auto;
    padding: calc(14px + env(safe-area-inset-top)) 16px 0 16px;
  }

  /* HEADER */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding: 4px 0 14px 0;
  }
  .brand{display:flex; align-items:center; gap:10px; min-width:0;}
  .brand-mark{
    width:62px; height:62px; border-radius:50%;
    border:2px solid var(--gold);
    object-fit:cover;
    flex-shrink:0;
  }
  .brand .titles{min-width:0;}
  .brand h1{
    font-family:'Oswald',sans-serif; font-weight:600; font-size:14px;
    letter-spacing:.5px; text-transform:uppercase; margin:0; line-height:1.25;
  }
  .brand p{margin:2px 0 0; font-size:11px; color:var(--muted); letter-spacing:.5px;}

  /* MANE RING */
  .mane-ring{position:relative; width:46px; height:46px; flex-shrink:0;}
  .mane-ring svg{transform:rotate(-90deg);}
  .mane-center{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-size:12px; font-weight:600; color:var(--gold);
  }

  /* iOS install tip */
  .ios-tip{
    background:var(--bg-elev); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:14px; font-size:12.5px; color:var(--muted);
    line-height:1.5; display:none;
  }
  .ios-tip.show{display:flex; gap:10px; align-items:flex-start;}
  .ios-tip b{color:var(--cream);}
  .ios-tip .close{
    margin-left:auto; background:none; border:none; color:var(--muted);
    font-size:16px; cursor:pointer; padding:0 0 0 8px; line-height:1;
  }

  /* DAY NAV */
  .day-nav{
    display:grid; grid-template-columns:repeat(6,1fr); gap:6px;
    margin-bottom:16px;
  }
  .day-btn{
    background:var(--bg-elev); border:1px solid var(--line); border-radius:10px;
    color:var(--muted); font-family:'Oswald',sans-serif; font-size:12px; font-weight:500;
    letter-spacing:.5px; text-transform:uppercase; padding:9px 0 7px;
    cursor:pointer; text-align:center; position:relative;
  }
  .day-btn .d{display:block; font-size:13px;}
  .day-btn .dot{
    display:block; width:5px; height:5px; border-radius:50%; margin:5px auto 0;
    background:var(--line);
  }
  .day-btn.active{border-color:var(--gold); color:var(--gold); background:rgba(232,182,74,0.08);}
  .day-btn.complete .dot{background:var(--done);}
  .day-btn.active .dot{background:var(--gold);}

  /* DAY HEADER */
  .day-head{margin-bottom:14px;}
  .day-head .eyebrow{
    font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--amber);
    font-weight:600; margin:0 0 4px;
  }
  .day-head h2{
    font-family:'Oswald',sans-serif; font-weight:600; font-size:24px; margin:0;
    letter-spacing:.5px;
  }
  .day-head .note{
    margin:6px 0 0; font-size:12.5px; color:var(--muted); line-height:1.5;
  }

  /* PROGRESS BAR */
  .progress-card{
    background:var(--bg-elev); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:16px;
  }
  .progress-top{
    display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;
  }
  .progress-top span:first-child{font-size:12px; color:var(--muted); letter-spacing:.5px;}
  .progress-top span:last-child{
    font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; color:var(--gold);
  }
  .progress-track{
    height:6px; background:var(--bg-elev-2); border-radius:6px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:var(--gold); border-radius:6px; width:0%;
    transition:width .25s ease;
  }

  /* OPTION PICKER (saturday) */
  .option-picker{display:flex; gap:8px; margin-bottom:16px;}
  .option-btn{
    flex:1; background:var(--bg-elev); border:1px solid var(--line); border-radius:12px;
    color:var(--muted); padding:10px 6px; text-align:center; cursor:pointer;
    font-size:12px; line-height:1.4;
  }
  .option-btn b{display:block; font-family:'Oswald',sans-serif; font-size:15px; color:var(--cream); font-weight:600; margin-bottom:2px;}
  .option-btn.active{border-color:var(--gold); background:rgba(232,182,74,0.08); color:var(--cream);}
  .option-btn.active b{color:var(--gold);}

  /* EXERCISE CARDS */
  .ex-list{display:flex; flex-direction:column; gap:10px;}
  .ex-card{
    background:var(--bg-elev); border:1px solid var(--line); border-radius:14px;
    padding:14px;
    transition:border-color .2s, background .2s;
  }
  .ex-card.done{border-color:var(--done); background:var(--done-bg);}
  .ex-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px;}
  .ex-name{font-family:'Oswald',sans-serif; font-size:16px; font-weight:500; line-height:1.3;}
  .ex-spec{font-size:12px; color:var(--muted); margin-top:3px;}
  .ex-card.done .ex-spec{color:var(--done);}
  .vid-btn{
    flex-shrink:0; width:34px; height:34px; border-radius:50%;
    border:1px solid var(--line); background:var(--bg-elev-2); color:var(--gold);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    text-decoration:none; font-size:14px;
  }
  .sets-row{display:flex; gap:6px; flex-wrap:wrap;}
  .set-pill{
    flex:1 1 0; min-width:34px; height:32px; border-radius:8px;
    border:1px solid var(--line); background:var(--bg-elev-2); color:var(--muted);
    display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-size:13px; font-weight:500;
    cursor:pointer; user-select:none;
  }
  .set-pill.on{background:var(--done); border-color:var(--done); color:#1A2406;}

  /* ACTIVITY CARDS */
  .act-card{
    background:var(--bg-elev); border:1px solid var(--line); border-radius:14px;
    padding:14px; display:flex; align-items:center; gap:12px; cursor:pointer;
    transition:border-color .2s, background .2s;
  }
  .act-card.done{border-color:var(--done); background:var(--done-bg);}
  .act-check{
    width:26px; height:26px; border-radius:50%; border:2px solid var(--line);
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    color:var(--bg); font-size:14px; font-weight:700;
  }
  .act-card.done .act-check{background:var(--done); border-color:var(--done);}
  .act-text .ex-name{margin-bottom:2px;}
  .act-text .ex-spec{margin-top:0;}

  .section-label{
    font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--amber);
    font-weight:600; margin:18px 0 10px;
  }

  .rest-card{
    background:var(--bg-elev); border:1px solid var(--line); border-radius:14px;
    padding:28px 14px; text-align:center; color:var(--muted); font-size:13.5px; line-height:1.6;
  }
  .rest-card .lion{font-size:34px; color:var(--gold); margin-bottom:8px; display:block;}

  footer{
    text-align:center; margin-top:28px; padding-top:16px; border-top:1px solid var(--line);
    font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase;
  }
</style>
</head>
<body>
<div class="wrap">

    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="option-picker" id="optionPicker" style="display:none;"></div>

  <div id="content"></div>

  <footer>App Pessoal de Treino - By Luã Reis · feito sob medida</footer>
</div>

<script>
/* ---------- DATA ---------- */
const WEEK = [
  { id:'seg', label:'Seg', day:'Segunda-feira', eyebrow:'Peito + Ombro',
    exercises:[
      {name:'Supino reto', sets:4, reps:'6-10'},
      {name:'Supino inclinado', sets:4, reps:'8-12'},
      {name:'Crucifixo na máquina', sets:3, reps:'12-15'},
      {name:'Desenvolvimento militar', sets:4, reps:'8-12'},
      {name:'Elevação lateral', sets:4, reps:'12-15'},
      {name:'Tríceps corda', sets:3, reps:'12-15'},
    ],
    activities:[ {name:'Futsal', spec:'À noite — partida'} ]
  },
  { id:'ter', label:'Ter', day:'Terça-feira', eyebrow:'Costas + Bíceps',
    exercises:[
      {name:'Puxada frontal', sets:4, reps:'8-12'},
      {name:'Remada baixa', sets:4, reps:'8-12'},
      {name:'Remada cavalinho', sets:3, reps:'8-12'},
      {name:'Pulldown', sets:3, reps:'12-15'},
      {name:'Rosca direta', sets:4, reps:'8-12'},
      {name:'Rosca martelo', sets:3, reps:'10-12'},
    ],
    activities:[ {name:'Abdominal', spec:'10 minutos'} ]
  },
  { id:'qua', label:'Qua', day:'Quarta-feira', eyebrow:'Perna · dia principal',
    note:'Foco total nas pernas hoje. Sem corrida pesada.',
    exercises:[
      {name:'Agachamento', sets:4, reps:'6-10'},
      {name:'Leg press', sets:4, reps:'10-15'},
      {name:'Cadeira extensora', sets:3, reps:'12-15'},
      {name:'Mesa flexora', sets:4, reps:'10-15'},
      {name:'Stiff', sets:3, reps:'8-12'},
      {name:'Panturrilha', sets:5, reps:'15-20'},
    ],
    activities:[]
  },
  { id:'qui', label:'Qui', day:'Quinta-feira', eyebrow:'Ombro + Braços',
    note:'Treino curto — máximo de 50 minutos na academia.',
    exercises:[
      {name:'Elevação lateral', sets:4, reps:'15'},
      {name:'Desenvolvimento com halteres', sets:3, reps:'10-12'},
      {name:'Rosca direta', sets:4, reps:'10-12'},
      {name:'Rosca martelo', sets:3, reps:'10-12'},
      {name:'Tríceps corda', sets:4, reps:'10-12'},
      {name:'Tríceps francês', sets:3, reps:'10-12'},
    ],
    activities:[ {name:'Futsal', spec:'À noite — partida curta'} ]
  },
  { id:'sex', label:'Sex', day:'Sexta-feira', eyebrow:'Costas + Peito · volume moderado',
    exercises:[
      {name:'Supino inclinado', sets:4, reps:'8-12'},
      {name:'Remada máquina', sets:4, reps:'8-12'},
      {name:'Puxada aberta', sets:3, reps:'10-12'},
      {name:'Crossover', sets:3, reps:'12-15'},
      {name:'Remada unilateral', sets:3, reps:'10-12'},
      {name:'Face pull', sets:3, reps:'15'},
    ],
    activities:[]
  },
  { id:'sab', label:'Sáb', day:'Sábado', eyebrow:'Escolha do dia',
    options:{
      A:{ label:'Cardio', sub:'Caminhada + abdominal',
          exercises:[], activities:[
            {name:'Caminhada', spec:'45 minutos'},
            {name:'Abdominal', spec:'Série livre'}
          ]
      },
      B:{ label:'Full body', sub:'Treino leve',
          exercises:[
            {name:'Leg press (leve)', sets:3, reps:'15'},
            {name:'Remada baixa (leve)', sets:3, reps:'15'},
            {name:'Desenvolvimento halteres (leve)', sets:3, reps:'15'},
            {name:'Elevação lateral (leve)', sets:3, reps:'15'},
            {name:'Panturrilha', sets:3, reps:'20'},
          ],
          activities:[ {name:'Abdominal', spec:'Série livre'} ]
      },
      C:{ label:'Descanso', sub:'Recuperação total',
          exercises:[], activities:[], rest:true
      }
    }
  },
];

/* ---------- STORAGE (works in claude.ai preview AND when installed) ---------- */
const store = {
  async get(key){
    try{
      if(window.storage && window.storage.get){
        const r = await window.storage.get(key);
        return r ? r.value : null;
      }
    }catch(e){}
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  },
  async set(key, value){
    try{
      if(window.storage && window.storage.set){
        await window.storage.set(key, value);
        return;
      }
    }catch(e){}
    try{ localStorage.setItem(key, value); }catch(e){}
  }
};

/* ---------- HELPERS ---------- */
function pad(n){ return n.toString().padStart(2,'0'); }
function isoDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function mondayOf(d){
  const date = new Date(d);
  const day = date.getDay(); // 0 = domingo
  const diff = (day === 0 ? -6 : 1) - day;
  date.setDate(date.getDate() + diff);
  return date;
}
function dateForWeekIndex(idx){ // idx: 0=seg ... 5=sab, based on today's week
  const mon = mondayOf(new Date());
  const d = new Date(mon);
  d.setDate(mon.getDate() + idx);
  return d;
}

const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

/* ---------- STATE ---------- */
let activeIdx = 0;
let dayProgress = {}; // exercises: {name:[bool,...]}, activities:{name:bool}, option: 'A'|'B'|'C'
let weekStatus = [false,false,false,false,false,false];

function emptyProgress(dayDef){
  return { exercises:{}, activities:{}, option:null };
}

function getActiveDayDef(){
  const base = WEEK[activeIdx];
  if(base.options){
    const opt = dayProgress.option || 'A';
    const o = base.options[opt];
    return { ...base, exercises:o.exercises, activities:o.activities, rest:o.rest, currentOption:opt };
  }
  return base;
}

function progressKey(dateStr){ return `lionroutine:progress:${dateStr}`; }

async function loadDay(idx){
  const date = isoDate(dateForWeekIndex(idx));
  const raw = await store.get(progressKey(date));
  if(raw){
    try{ dayProgress = JSON.parse(raw); }catch(e){ dayProgress = emptyProgress(); }
  }else{
    dayProgress = emptyProgress();
  }
  if(!dayProgress.exercises) dayProgress.exercises = {};
  if(!dayProgress.activities) dayProgress.activities = {};
}

async function saveDay(idx){
  const date = isoDate(dateForWeekIndex(idx));
  await store.set(progressKey(date), JSON.stringify(dayProgress));
}

function isDayComplete(prog, dayDef){
  let total = 0, done = 0;
  let def = dayDef;
  if(dayDef.options){
    const opt = prog.option || 'A';
    def = dayDef.options[opt];
    if(def.rest) return true;
  }
  (def.exercises||[]).forEach(ex=>{
    const arr = (prog.exercises||{})[ex.name] || [];
    total += ex.sets;
    done += arr.filter(Boolean).length;
  });
  (def.activities||[]).forEach(act=>{
    total += 1;
    if((prog.activities||{})[act.name]) done += 1;
  });
  if(total === 0) return false;
  return done === total;
}

async function refreshWeekStatus(){
  for(let i=0;i<6;i++){
    const date = isoDate(dateForWeekIndex(i));
    const raw = await store.get(progressKey(date));
    let prog = emptyProgress();
    if(raw){ try{ prog = JSON.parse(raw); }catch(e){} }
    weekStatus[i] = isDayComplete(prog, WEEK[i]);
  }
}

/* ---------- RENDER ---------- */
function renderTopBar(){
  const today = new Date();
  document.getElementById('todayLabel').textContent =
    `${today.getDate()} de ${MESES[today.getMonth()]}`;

  const completed = weekStatus.filter(Boolean).length;
  document.getElementById('maneLabel').textContent = `${completed}/6`;
  const circumference = 2 * Math.PI * 19;
  const offset = circumference - (completed/6)*circumference;
  document.getElementById('maneArc').setAttribute('stroke-dasharray', circumference.toFixed(1));
  document.getElementById('maneArc').setAttribute('stroke-dashoffset', offset.toFixed(1));
}

function renderNav(){
  const nav = document.getElementById('dayNav');
  nav.innerHTML = '';
  WEEK.forEach((d,i)=>{
    const btn = document.createElement('div');
    btn.className = 'day-btn' + (i===activeIdx?' active':'') + (weekStatus[i] && i!==activeIdx ? ' complete':'') + (weekStatus[i] && i===activeIdx ? ' complete':'');
    btn.innerHTML = `<span class="d">${d.label}</span><span class="dot"></span>`;
    btn.addEventListener('click', ()=>switchDay(i));
    nav.appendChild(btn);
  });
}

function videoUrl(name){
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(name + ' execução correta academia');
}

function renderDay(){
  const def = getActiveDayDef();
  document.getElementById('dayEyebrow').textContent = def.eyebrow;
  document.getElementById('dayTitle').textContent = def.day;

  const noteEl = document.getElementById('dayNote');
  if(def.note){ noteEl.textContent = def.note; noteEl.style.display='block'; }
  else { noteEl.style.display='none'; }

  // option picker
  const picker = document.getElementById('optionPicker');
  const base = WEEK[activeIdx];
  if(base.options){
    picker.style.display='flex';
    picker.innerHTML='';
    const opt = dayProgress.option || 'A';
    Object.keys(base.options).forEach(key=>{
      const o = base.options[key];
      const b = document.createElement('div');
      b.className = 'option-btn' + (key===opt?' active':'');
      b.innerHTML = `<b>${key}</b>${o.label} · ${o.sub}`;
      b.addEventListener('click', async ()=>{
        dayProgress.option = key;
        await saveDay(activeIdx);
        renderDay();
        await refreshWeekStatus();
        renderNav();
        renderTopBar();
      });
      picker.appendChild(b);
    });
  }else{
    picker.style.display='none';
  }

  const content = document.getElementById('content');
  content.innerHTML = '';

  if(def.rest){
    content.innerHTML = `<div class="rest-card"><span class="lion">🦁</span>Hoje é dia de descanso.<br>Aproveite para recuperar — o leão também precisa dormir.</div>`;
    updateProgress(def);
    return;
  }

  if(def.exercises && def.exercises.length){
    if(base.options) addLabel(content, 'Treino');
    const list = document.createElement('div');
    list.className = 'ex-list';
    def.exercises.forEach(ex=>{
      list.appendChild(renderExerciseCard(ex));
    });
    content.appendChild(list);
  }

  if(def.activities && def.activities.length){
    addLabel(content, def.exercises && def.exercises.length ? 'Extra' : 'Atividade');
    const list = document.createElement('div');
    list.className = 'ex-list';
    def.activities.forEach(act=>{
      list.appendChild(renderActivityCard(act));
    });
    content.appendChild(list);
  }

  updateProgress(def);
}

function addLabel(parent, text){
  const p = document.createElement('p');
  p.className = 'section-label';
  p.textContent = text;
  parent.appendChild(p);
}

function renderExerciseCard(ex){
  const arr = dayProgress.exercises[ex.name] || new Array(ex.sets).fill(false);
  dayProgress.exercises[ex.name] = arr;
  const allDone = arr.length===ex.sets && arr.every(Boolean);

  const card = document.createElement('div');
  card.className = 'ex-card' + (allDone?' done':'');

  const top = document.createElement('div');
  top.className = 'ex-top';
  top.innerHTML = `
    <div>
      <div class="ex-name">${ex.name}</div>
      <div class="ex-spec">${ex.sets}x · ${ex.reps} repetições</div>
    </div>`;
  const vid = document.createElement('a');
  vid.className = 'vid-btn';
  vid.href = videoUrl(ex.name);
  vid.target = '_blank';
  vid.rel = 'noopener';
  vid.setAttribute('aria-label','Ver vídeo de '+ex.name);
  vid.textContent = '▶';
  top.appendChild(vid);
  card.appendChild(top);

  const row = document.createElement('div');
  row.className = 'sets-row';
  for(let s=0; s<ex.sets; s++){
    const pill = document.createElement('div');
    pill.className = 'set-pill' + (arr[s] ? ' on':'');
    pill.textContent = (s+1).toString();
    pill.addEventListener('click', async ()=>{
      arr[s] = !arr[s];
      await saveDay(activeIdx);
      renderDay();
      await refreshWeekStatus();
      renderNav();
      renderTopBar();
    });
    row.appendChild(pill);
  }
  card.appendChild(row);
  return card;
}

function renderActivityCard(act){
  const done = !!dayProgress.activities[act.name];
  const card = document.createElement('div');
  card.className = 'act-card' + (done?' done':'');
  card.innerHTML = `
    <div class="act-check">${done?'✓':''}</div>
    <div class="act-text">
      <div class="ex-name">${act.name}</div>
      <div class="ex-spec">${act.spec}</div>
    </div>`;
  card.addEventListener('click', async ()=>{
    dayProgress.activities[act.name] = !dayProgress.activities[act.name];
    await saveDay(activeIdx);
    renderDay();
    await refreshWeekStatus();
    renderNav();
    renderTopBar();
  });
  return card;
}

function updateProgress(def){
  let total = 0, done = 0;
  if(def.rest){
    total = 1; done = 1;
  }else{
    (def.exercises||[]).forEach(ex=>{
      const arr = dayProgress.exercises[ex.name] || [];
      total += ex.sets;
      done += arr.filter(Boolean).length;
    });
    (def.activities||[]).forEach(act=>{
      total += 1;
      if(dayProgress.activities[act.name]) done += 1;
    });
  }
  const pct = total===0 ? 0 : Math.round((done/total)*100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';
}

async function switchDay(idx){
  activeIdx = idx;
  await loadDay(idx);
  renderNav();
  renderDay();
}

/* ---------- iOS install tip ---------- */
function maybeShowIosTip(){
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone = window.navigator.standalone;
  if(isIos && !standalone){
    document.getElementById('iosTip').classList.add('show');
  }
}
document.getElementById('iosTipClose').addEventListener('click', ()=>{
  document.getElementById('iosTip').classList.remove('show');
});

/* ---------- INIT ---------- */
(async function init(){
  maybeShowIosTip();
  await refreshWeekStatus();
  renderTopBar();
  // sempre inicia na segunda-feira
  activeIdx = 0;
  await loadDay(activeIdx);
  renderNav();
  renderDay();
})();
</script>
